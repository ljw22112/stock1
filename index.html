<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 배당 계산기 PRO</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; margin-top: 0; font-weight: 700; color: #111827; }
        .form-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .result-row:last-child { border-bottom: none; }
        .label { color: #64748b; font-size: 15px; }
        .value { font-weight: 600; font-size: 15px; }
        .highlight { color: var(--primary); font-size: 18px; font-weight: 700; }
        .hidden { display: none; }
        .loading { color: #64748b; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📊 실시간 배당 계산기</h1>
        <div class="form-group">
            <input type="text" id="ticker" placeholder="티커 입력 (예: AAPL, O, SCHD)" style="text-transform: uppercase;">
            <input type="number" id="quantity" placeholder="보유 수량 (주)">
            <button onclick="calculateDividend()">계산</button>
        </div>
        <div id="loadingText" class="loading hidden">🔄 실시간 금융 데이터 동기화 중...</div>
    </div>

    <div id="resultCard" class="card hidden">
        <h2 id="stockName" style="margin-top:0; font-size: 20px;">-</h2>
        <div class="result-row">
            <span class="label">현재 주가 (USD)</span>
            <span class="value" id="currentPrice">$0.00</span>
        </div>
        <div class="result-row">
            <span class="label">적용 실시간 환율</span>
            <span class="value" id="exchangeRate">0원/USD</span>
        </div>
        <div class="result-row">
            <span class="label">총 자산 평가액</span>
            <span class="value" id="totalValue">0원 ($0.00)</span>
        </div>
        <div class="result-row">
            <span class="label">배당 수익률 (Yield)</span>
            <span class="value" id="dividendYield">0.00%</span>
        </div>
        <div class="result-row">
            <span class="label">배당 주기</span>
            <span class="value" id="frequency">-</span>
        </div>
        <div class="result-row" style="margin-top: 10px; background: #eff6ff; padding: 12px; border-radius: 8px;">
            <span class="label" style="color: #1e40af; font-weight: 600;">예상 연간 배당금 (원화)</span>
            <span class="highlight" id="annualDividendKRW">0원</span>
        </div>
    </div>
</div>

<script>
    // 1. 실시간 환율 가져오기 (Frankfurter API)
    async function getExchangeRate() {
        try {
            const response = await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');
            const data = await response.json();
            return data.rates.KRW;
        } catch (error) {
            console.error("환율 API 호출 실패, 기본값 사용:", error);
            return 1350; 
        }
    }

    // 2. 가상 주식 및 배당 데이터베이스 (추후 외부 API 확장 가능)
    function getStockData(ticker) {
        const mockDatabase = {
            'AAPL': { price: 175.50, dividendPerShare: 0.96, freq: 4, name: 'Apple Inc.' },
            'O': { price: 54.20, dividendPerShare: 3.08, freq: 12, name: 'Realty Income' },
            'SCHD': { price: 78.10, dividendPerShare: 2.66, freq: 4, name: 'Schwab US Dividend Equity ETF' }
        };
        return mockDatabase[ticker.toUpperCase()] || null;
    }

    // 3. 메인 계산 및 UI 렌더링 로직
    async function calculateDividend() {
        const tickerInput = document.getElementById('ticker').value.trim();
        const quantityInput = document.getElementById('quantity').value.trim();
        const loadingText = document.getElementById('loadingText');
        const resultCard = document.getElementById('resultCard');

        if (!tickerInput || !quantityInput) {
            alert('티커와 수량을 모두 입력해 주세요.');
            return;
        }

        loadingText.classList.remove('hidden');
        resultCard.classList.add('hidden');

        try {
            // 데이터 수집
            const exchangeRate = await getExchangeRate();
            const stockInfo = getStockData(tickerInput);

            if (!stockInfo) {
                alert('지원하지 않거나 찾을 수 없는 티커입니다. (AAPL, O, SCHD 중 입력)');
                loadingText.classList.add('hidden');
                return;
            }

            // 계산 연산
            const quantity = parseFloat(quantityInput);
            const totalValueUSD = stockInfo.price * quantity;
            const totalValueKRW = totalValueUSD * exchangeRate;
            const annualDividendUSD = stockInfo.dividendPerShare * quantity;
            const annualDividendKRW = annualDividendUSD * exchangeRate;
            const dividendYield = (stockInfo.dividendPerShare / stockInfo.price) * 100;

            // UI 업데이트
            document.getElementById('stockName').innerText = `${stockInfo.name} (${tickerInput.toUpperCase()})`;
            document.getElementById('currentPrice').innerText = `$${stockInfo.price.toFixed(2)}`;
            document.getElementById('exchangeRate').innerText = `${exchangeRate.toLocaleString(undefined, {maximumFractionDigits:2})} 원/USD`;
            document.getElementById('totalValue').innerText = `${Math.round(totalValueKRW).toLocaleString()}원 ($${totalValueUSD.toFixed(2)})`;
            document.getElementById('dividendYield').innerText = `${dividendYield.toFixed(2)}%`;
            document.getElementById('frequency').innerText = stockInfo.freq === 12 ? '월배당' : '분기배당';
            document.getElementById('annualDividendKRW').innerText = `${Math.round(annualDividendKRW).toLocaleString()}원 / 년`;

            // 로딩 종료 및 결과 출력
            loadingText.classList.add('hidden');
            resultCard.classList.remove('hidden');

        } catch (error) {
            console.error(error);
            alert('데이터를 처리하는 중 오류가 발생했습니다.');
            loadingText.classList.add('hidden');
        }
    }
</script>
</body>
</html>
